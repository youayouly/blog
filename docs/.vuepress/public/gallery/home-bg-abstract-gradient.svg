<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f7ff" />
      <stop offset="35%" stop-color="#e8f0ff" />
      <stop offset="70%" stop-color="#f5f0ff" />
      <stop offset="100%" stop-color="#fdf8ff" />
    </linearGradient>
    <radialGradient id="bloomA" cx="22%" cy="18%" r="55%">
      <stop offset="0%" stop-color="rgba(186, 230, 253, 0.55)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0)" />
    </radialGradient>
    <radialGradient id="bloomB" cx="82%" cy="28%" r="50%">
      <stop offset="0%" stop-color="rgba(233, 213, 255, 0.45)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0)" />
    </radialGradient>
    <radialGradient id="bloomC" cx="48%" cy="88%" r="45%">
      <stop offset="0%" stop-color="rgba(204, 251, 241, 0.35)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0)" />
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.06" />
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)" />
  <rect width="1920" height="1080" fill="url(#bloomA)" />
  <rect width="1920" height="1080" fill="url(#bloomB)" />
  <rect width="1920" height="1080" fill="url(#bloomC)" />
  <rect width="1920" height="1080" filter="url(#grain)" opacity="0.35" />
</svg>
